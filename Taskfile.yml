version: "3"

vars:
  FLAKE_DIR: "{{.USER_WORKING_DIR}}"
  # System users
  BARADUR_USER: "arrayofone"
  DIGIBOOK_USER: "db"
  K3S_NODE_USER: "admin"

tasks:
  # =============================================================================
  # BARADUR (NixOS)
  # =============================================================================

  baradur:build:
    desc: "Build Baradur NixOS configuration"
    cmds:
      - sudo nixos-rebuild build --flake {{.FLAKE_DIR}}#baradur

  baradur:switch:
    desc: "Switch Baradur to new configuration"
    cmds:
      - sudo nixos-rebuild switch --flake {{.FLAKE_DIR}}#baradur

  baradur:test:
    desc: "Test Baradur configuration"
    cmds:
      - sudo nixos-rebuild test --flake {{.FLAKE_DIR}}#baradur

  baradur:home:
    desc: "Switch Baradur Home Manager configuration"
    cmds:
      - home-manager switch --flake {{.FLAKE_DIR}}#{{.BARADUR_USER}}@baradur

  baradur:deploy:
    desc: "Full Baradur deployment (build + switch + home)"
    cmds:
      - task: check
      - task: baradur:build
      - task: baradur:switch
      - task: baradur:home
      - echo "🚀 Baradur deployment completed!"

  # =============================================================================
  # DIGIBOOK (Darwin)
  # =============================================================================

  digibook:build:
    desc: "Build Digibook Darwin configuration"
    cmds:
      - darwin-rebuild build --flake {{.FLAKE_DIR}}#digibook

  digibook:switch:
    desc: "Switch Digibook to new configuration"
    cmds:
      - darwin-rebuild switch --flake {{.FLAKE_DIR}}#digibook

  digibook:test:
    desc: "Test Digibook configuration"
    cmds:
      - darwin-rebuild check --flake {{.FLAKE_DIR}}#digibook

  digibook:home:
    desc: "Switch Digibook Home Manager configuration"
    cmds:
      - home-manager switch --flake {{.FLAKE_DIR}}#{{.DIGIBOOK_USER}}@digibook

  digibook:deploy:
    desc: "Full Digibook deployment (build + switch + home)"
    cmds:
      - task: check
      - task: digibook:build
      - task: digibook:switch
      - task: digibook:home
      - echo "🚀 Digibook deployment completed!"

  # =============================================================================
  # K3S-NODE (NixOS)
  # =============================================================================

  k3s-node:build:
    desc: "Build k3s-node NixOS configuration"
    cmds:
      - sudo nixos-rebuild build --flake {{.FLAKE_DIR}}#k3s-node

  k3s-node:switch:
    desc: "Switch k3s-node to new configuration"
    cmds:
      - sudo nixos-rebuild switch --flake {{.FLAKE_DIR}}#k3s-node

  k3s-node:test:
    desc: "Test k3s-node configuration"
    cmds:
      - sudo nixos-rebuild test --flake {{.FLAKE_DIR}}#k3s-node

  k3s-node:home:
    desc: "Switch k3s-node Home Manager configuration"
    cmds:
      - home-manager switch --flake {{.FLAKE_DIR}}#{{.K3S_NODE_USER}}@k3s-node

  k3s-node:deploy:
    desc: "Full k3s-node deployment (build + switch + home)"
    cmds:
      - task: check
      - task: k3s-node:build
      - task: k3s-node:switch
      - task: k3s-node:home
      - echo "🚀 k3s-node deployment completed!"

  # =============================================================================
  # FLAKE MANAGEMENT
  # =============================================================================

  update:
    desc: "Update all flake inputs"
    cmds:
      - nix flake update {{.FLAKE_DIR}}
      - echo "✅ Flake inputs updated!"

  check:
    desc: "Check flake for errors"
    cmds:
      - nix flake check {{.FLAKE_DIR}}

  show:
    desc: "Show flake outputs"
    cmds:
      - nix flake show {{.FLAKE_DIR}}

  # =============================================================================
  # DEVELOPMENT
  # =============================================================================

  dev:
    desc: "Enter development shell"
    cmds:
      - nix develop {{.FLAKE_DIR}}#digits
    interactive: true

  # =============================================================================
  # MAINTENANCE
  # =============================================================================

  gc:
    desc: "Run garbage collection and optimize store"
    cmds:
      - sudo nix-collect-garbage -d
      - nix-store --optimise
      - echo "🗑️ Garbage collection completed!"

  # =============================================================================
  # ISO GENERATION
  # =============================================================================

  iso:
    desc: "Generate SD card image for Raspberry Pi"
    cmds:
      - nix run github:nix-community/nixos-generators -- -f sd-aarch64 -c {{.FLAKE_DIR}}#nixosConfigurations.{{.CLI_ARGS | default "k3s-node"}}
      - echo "✅ SD card image generated!"
      - 'echo "📝 Flash with: dd if=./result/sd-image/*.img of=/dev/sdX bs=4M status=progress"'

  # =============================================================================
  # SECRETS MANAGEMENT
  # =============================================================================

  secrets:
    desc: "Edit secrets file with SOPS"
    cmds:
      - sops {{.FLAKE_DIR}}/secrets/fellowship.yaml

  # =============================================================================
  # HELP
  # =============================================================================

  help:
    desc: "Show available tasks"
    cmds:
      - task --list

  default:
    desc: "Show help by default"
    cmds:
      - task: help
